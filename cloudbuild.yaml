# gigs.ge UAT Deployment Pipeline
#
# Set these Substitution Variables in your Cloud Build trigger
# (GCP Console → Cloud Build → Triggers → Edit → Substitution variables):
#
#   _DB_PASSWORD          Strong password for Cloud SQL postgres user
#   _JWT_ACCESS_SECRET    32+ random chars (openssl rand -hex 32)
#   _JWT_REFRESH_SECRET   32+ random chars (openssl rand -hex 32)
#   _API_URL              Cloud Run URL of gigsge-api after first deploy
#                         e.g. https://gigsge-api-abc123-uc.a.run.app
#   _FRONTEND_URL         Cloud Run URL of gigsge-web after first deploy
#                         e.g. https://gigsge-web-abc123-uc.a.run.app
#
# NEVER put real secret values in this file. This file is in source control.

steps:
  # ── 1. Build the API Image (TypeScript Fastify) ────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/api'
      - '-f'
      - 'apps/api/Dockerfile'
      - '.'

  # ── 2. Build the Web Image (Next.js) ──────────────────────────────────────
  # NEXT_PUBLIC_API_URL is baked into the JS bundle at build time.
  # It must be the public URL that browsers use to reach the API — not localhost.
  # Set _API_URL in your trigger substitutions to the Cloud Run URL of gigsge-api.
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/web'
      - '-f'
      - 'apps/web/Dockerfile'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=${_API_URL}'
      - '.'

  # ── 3. Push images to Container Registry ──────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/web']

  # ── 4. Deploy API to Cloud Run with Redis sidecar ─────────────────────────
  # Service-level flags (region, cloudsql, unauthenticated, timeout) come first.
  # --cpu and --memory are container-scoped: place them after the --container
  # flag they belong to.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gigsge-api'
      - '--region=us-central1'
      - '--add-cloudsql-instances=gigsge:us-central1:gigsge-uat-db'
      - '--allow-unauthenticated'
      - '--timeout=300s'
      - '--container=api'
      - '--image=gcr.io/$PROJECT_ID/api'
      - '--port=3001'
      - '--cpu=1'
      - '--memory=512Mi'
      - '--update-env-vars=INSTANCE_CONNECTION_NAME=gigsge:us-central1:gigsge-uat-db,DB_PASSWORD=${_DB_PASSWORD},JWT_ACCESS_SECRET=${_JWT_ACCESS_SECRET},JWT_REFRESH_SECRET=${_JWT_REFRESH_SECRET},NODE_ENV=production,FRONTEND_URL=${_FRONTEND_URL}'
      - '--container=redis'
      - '--image=redis:7-alpine'
      - '--cpu=0.5'
      - '--memory=256Mi'

  # ── 5. Deploy Frontend to Cloud Run ───────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gigsge-web'
      - '--image=gcr.io/$PROJECT_ID/web'
      - '--region=us-central1'
      - '--allow-unauthenticated'

# Default substitution values — override all of these in the Cloud Build trigger.
# Leaving a secret empty here is intentional: the trigger must supply real values.
substitutions:
  _DB_PASSWORD: ''           # REQUIRED — Cloud SQL postgres password
  _JWT_ACCESS_SECRET: ''     # REQUIRED — 32+ char random string
  _JWT_REFRESH_SECRET: ''    # REQUIRED — 32+ char random string
  _API_URL: ''               # REQUIRED — Cloud Run URL of gigsge-api
  _FRONTEND_URL: ''          # REQUIRED — Cloud Run URL of gigsge-web

options:
  logging: CLOUD_LOGGING_ONLY
